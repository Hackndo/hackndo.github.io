<!doctype html>
<html lang="fr-fr">

  {% include head.html %}

  <body>
    <a class="skip-link" href="#content">Aller au contenu</a>

    {% include header.html %}

    <div class="layout">
      {% include sidebar.html %}

      <main class="content" id="content">
        <div class="container">
          {% if page.url == "/" %}
            <p class="lang-switch"><a href="https://en.hackndo.com{{ page.url }}" hreflang="en" aria-label="Read in English"><img src="/assets/icones/en.png" alt="English version" /></a></p>
          {% elsif page.translation and page.translation contains "en" %}
            <p class="lang-switch"><a href="https://en.hackndo.com{{ page.url }}" hreflang="en" aria-label="Read in English"><img src="/assets/icones/en.png" alt="English version" /></a></p>
          {% endif %}
          {{ content }}
        </div>
      </main>
    </div>

    <script src="/assets/js/anchor.min.js" defer></script>
    <script src="/assets/js/main.js?v=3.3" defer></script>
  </body>
</html>
